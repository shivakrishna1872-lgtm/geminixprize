version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NODE_ENV=development
    depends_on:
      - orchestrator
    networks:
      - antigravity

  # ---------------------------------------------------------------------------
  # Python FastAPI Orchestrator
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./backend/orchestrator
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - /tmp:/tmp
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
      - GCP_REGION=${GCP_REGION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-001}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - USE_MOCK_INTEGRATIONS=${USE_MOCK_INTEGRATIONS:-true}
      - MOCK_AGENT_DELAY_MS=${MOCK_AGENT_DELAY_MS:-800}
      - PRINTIFY_API_KEY=${PRINTIFY_API_KEY}
      - PRINTIFY_SHOP_ID=${PRINTIFY_SHOP_ID}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - DUDA_API_KEY=${DUDA_API_KEY}
      - DUDA_API_SECRET=${DUDA_API_SECRET}
    networks:
      - antigravity
    restart: on-failure

networks:
  antigravity:
    driver: bridge
